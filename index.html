<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurir App - Exceed Express</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; touch-action: manipulation; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        input, select, textarea { background-color: #1e293b; border: 1px solid #334155; color: white; border-radius: 0.5rem; padding: 0.75rem; width: 100%; outline: none; transition: all 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); }
        input[readonly] { background-color: #0f172a; border-color: #1e293b; color: #94a3b8; cursor: not-allowed; }
        label { font-size: 0.75rem; font-weight: bold; color: #94a3b8; margin-bottom: 0.25rem; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
        
        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down { animation: fadeInDown 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // SCRIPT URL (PASTIKAN SUDAH DEPLOY NEW VERSION)
        // ==========================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVHojspm17WSZU42RaMtgiNWJikRfGyTlPh1FczlDJS9JL52PxX0d9RpkNJYM4g424/exec";

        const formatCurr = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num || 0);

        // FUNGSI AUTO-GENERATE RESI (Setara UNIQUEID() AppSheet)
        const generateResi = () => {
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let result = '';
            for (let i = 0; i < 8; i++) {
                result += chars[Math.floor(Math.random() * chars.length)];
            }
            return result;
        };

        function App() {
            const [kurirId, setKurirId] = useState(localStorage.getItem('ex_kurirId') || '');
            const [kurirName, setKurirName] = useState(localStorage.getItem('ex_kurirName') || '');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('ex_kurirId'));
            
            const [activeTab, setActiveTab] = useState('list');
            
            // Master Data
            const [packages, setPackages] = useState([]);
            const [olshops, setOlshops] = useState([]);
            const [zonas, setZonas] = useState([]);
            const [kurirs, setKurirs] = useState([]);
            
            const [isLoading, setIsLoading] = useState(true);
            const [message, setMessage] = useState('Memuat Database Sistem...');

            // State Form Input Baru
            const [form, setForm] = useState({ 
                idPaket: generateResi(), // Otomatis terisi 8 digit
                olshopName: '', 
                customerName: '', 
                customerPhone: '', 
                address: '', 
                hargaPaket: '', 
                zonaSelected: '', 
                ongkirDasar: '', 
                tambahanOngkir: '', 
                metodeBayar: 'CASH', 
                fotoBukti: null 
            });

            // State Modal Update Status
            const [updateModal, setUpdateModal] = useState({ isOpen: false, pkg: null, status: 'SUKSES', keterangan: '', fotoBukti: null });

            const loadData = async () => {
                setIsLoading(true);
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getInitData`);
                    const data = await res.json();
                    if(data.status === 'success') {
                        setOlshops(data.data.olshop || []);
                        setZonas(data.data.zona || []);
                        setKurirs(data.data.kurir || []);
                        
                        // Tarik data antaran kurir yang sedang login
                        const currentKurirName = localStorage.getItem('ex_kurirName') || kurirName;
                        if (currentKurirName) {
                            const myPkgs = data.data.packages.filter(p => 
                                String(p.kurirId).toLowerCase() === currentKurirName.toLowerCase() && 
                                ['proses', 'siap_antar', 'pending'].includes(String(p.status).toLowerCase())
                            );
                            setPackages(myPkgs.reverse());
                        }
                    }
                } catch(e) { console.error("Gagal load data", e); }
                setIsLoading(false);
            };

            // Muat data di awal untuk narik master kurir (supaya bisa validasi login)
            useEffect(() => { loadData(); }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                const inputId = e.target.kodeUser.value.trim().toLowerCase();
                
                // Cek Kode User dengan Master Kurir
                const validKurir = kurirs.find(k => String(k.id).trim().toLowerCase() === inputId);

                if(validKurir) {
                    localStorage.setItem('ex_kurirId', validKurir.id);
                    localStorage.setItem('ex_kurirName', validKurir.nama);
                    setKurirId(validKurir.id);
                    setKurirName(validKurir.nama);
                    setIsLoggedIn(true);
                    loadData(); // Segarkan paket
                } else {
                    alert("Akses Ditolak!\nKode User (ID Kurir) Anda tidak terdaftar di sistem pusat.");
                }
            };

            const compressImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
                            let width = img.width; let height = img.height;

                            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }

                            canvas.width = width; canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', 0.6));
                        };
                    };
                });
            };

            const submitNewPackage = async (e) => {
                e.preventDefault();
                setIsLoading(true); setMessage('Menyimpan paket baru...');
                
                try {
                    let base64Foto = "";
                    if(form.fotoBukti) base64Foto = await compressImage(form.fotoBukti);

                    const formData = new URLSearchParams();
                    formData.append('action', 'addPackage');
                    formData.append('kurirId', kurirId); 
                    formData.append('fotoBase64', base64Foto);
                    
                    Object.keys(form).forEach(k => { 
                        if(k !== 'fotoBukti' && k !== 'zonaSelected') {
                            formData.append(k, form[k]); 
                        }
                    });

                    const res = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                    const result = await res.json();
                    
                    if(result.status === 'success') {
                        alert("Paket Berhasil Diinput!");
                        // Kosongkan form dan buat resi baru lagi
                        setForm({ 
                            idPaket: generateResi(), 
                            olshopName: '', customerName: '', customerPhone: '', address: '', 
                            hargaPaket: '', zonaSelected: '', ongkirDasar: '', tambahanOngkir: '', 
                            metodeBayar: 'CASH', fotoBukti: null 
                        });
                        setActiveTab('list');
                        loadData();
                    } else { alert("Gagal menyimpan: " + result.message); }
                } catch(e) { alert("Error koneksi jaringan. Coba lagi."); }
                setIsLoading(false); setMessage('');
            };

            const submitUpdateStatus = async () => {
                setIsLoading(true); setMessage('Menyimpan status final...');
                try {
                    let base64Foto = "";
                    if(updateModal.fotoBukti) base64Foto = await compressImage(updateModal.fotoBukti);

                    const formData = new URLSearchParams();
                    formData.append('action', 'updateStatus');
                    formData.append('packageId', updateModal.pkg.packageId);
                    formData.append('status', updateModal.status);
                    formData.append('keterangan', updateModal.keterangan);
                    formData.append('fotoBase64', base64Foto);

                    const res = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                    const result = await res.json();

                    if(result.status === 'success') {
                        alert("Status Diperbarui!");
                        setUpdateModal({ isOpen: false, pkg: null, status: 'SUKSES', keterangan: '', fotoBukti: null });
                        loadData();
                    } else { alert("Gagal update status: " + result.message); }
                } catch(e) { alert("Terjadi error koneksi."); }
                setIsLoading(false); setMessage('');
            };

            if (!isLoggedIn) {
                return (
                    <div className="flex h-screen items-center justify-center p-4 relative">
                        {isLoading && (
                            <div className="absolute inset-0 z-50 glass flex flex-col justify-center items-center">
                                <i className="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
                                <p className="text-white font-bold">{message}</p>
                            </div>
                        )}
                        <form onSubmit={handleLogin} className="bg-slate-800 p-6 md:p-8 rounded-2xl w-full max-w-sm border border-slate-700 shadow-2xl z-10">
                            <div className="text-blue-500 text-5xl text-center mb-4"><i className="fas fa-motorcycle"></i></div>
                            <h2 className="text-2xl font-black text-center text-white mb-1">KURIR LOGIN</h2>
                            <p className="text-xs text-center text-slate-400 mb-6 uppercase tracking-wider">Sistem Manajemen Operasional</p>
                            
                            <label>Kode User (ID Kurir)</label>
                            <input 
                                type="text" 
                                name="kodeUser" 
                                required 
                                placeholder="Masukkan ID atau Email Anda" 
                                className="mb-6 font-mono text-center tracking-widest text-lg" 
                            />
                            
                            <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-blue-900/50 hover:bg-blue-500 transition-transform active:scale-95">
                                Verifikasi & Masuk
                            </button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen max-w-lg mx-auto bg-[#0f172a] shadow-xl relative">
                    {/* Header */}
                    <header className="bg-slate-800 p-4 border-b border-slate-700 flex justify-between items-center z-10 sticky top-0">
                        <div>
                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Kurir Aktif</p>
                            <h1 className="text-lg font-black text-white">{kurirName}</h1>
                        </div>
                        <button onClick={() => {localStorage.removeItem('ex_kurirId'); localStorage.removeItem('ex_kurirName'); setIsLoggedIn(false);}} className="text-red-400 text-xs font-bold bg-slate-900 px-3 py-1.5 rounded-md border border-slate-700 hover:bg-slate-700"><i className="fas fa-sign-out-alt mr-1"></i> Keluar</button>
                    </header>

                    {/* Loader Overlay */}
                    {isLoading && (
                        <div className="absolute inset-0 z-50 glass flex flex-col justify-center items-center">
                            <i className="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
                            <p className="text-white font-bold">{message || 'Memproses...'}</p>
                        </div>
                    )}

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-y-auto p-4 pb-24">
                        
                        {/* TAB 1: LIST PAKET BAWAAN */}
                        {activeTab === 'list' && (
                            <div className="space-y-3 animate-fade-in-down">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="font-bold text-slate-200"><i className="fas fa-box-open mr-2 text-blue-400"></i>Antaran Aktif Saya</h2>
                                    <span className="bg-slate-700 text-slate-300 text-xs px-2 py-1 rounded font-bold border border-slate-600 shadow-inner">{packages.length} Pkt</span>
                                </div>

                                {packages.length === 0 ? (
                                    <div className="text-center py-12 text-slate-500 bg-slate-800/50 rounded-xl border border-dashed border-slate-700">
                                        <i className="fas fa-clipboard-check text-5xl mb-4 text-slate-600"></i>
                                        <p className="font-bold text-slate-400">Tugas Selesai!</p>
                                        <p className="text-xs mt-1">Tidak ada paket pending/proses bawaan Anda.</p>
                                    </div>
                                ) : (
                                    packages.map((pkg, i) => (
                                        <div key={i} className="bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-sm relative overflow-hidden">
                                            <div className="flex justify-between items-start mb-3">
                                                <span className="bg-slate-900 text-blue-400 font-mono text-xs px-2.5 py-1 rounded border border-slate-700 font-bold tracking-wider">{pkg.packageId}</span>
                                                <span className={`text-[9px] font-bold px-2.5 py-1 rounded tracking-wider ${pkg.metodeBayar === 'TF OLSHOP' ? 'bg-purple-900/50 text-purple-300 border border-purple-800/50' : 'bg-green-900/50 text-green-400 border border-green-800/50'}`}>{pkg.metodeBayar}</span>
                                            </div>
                                            <h3 className="font-bold text-white text-lg leading-tight">{pkg.customerName}</h3>
                                            <p className="text-xs text-slate-400 mt-1"><i className="fas fa-store text-orange-400 mr-1.5"></i>{pkg.olshopName}</p>
                                            <p className="text-xs text-slate-400 mt-1"><i className="fas fa-map-marker-alt text-blue-400 mr-1.5 ml-0.5"></i>{pkg.address}</p>
                                            
                                            <div className="flex justify-between mt-4 pt-3 border-t border-slate-700 items-center">
                                                <div>
                                                    <p className="text-[9px] text-slate-500 font-bold uppercase tracking-widest mb-0.5">Total Tagih</p>
                                                    <p className="font-black text-blue-400 text-lg">{formatCurr(pkg.totalTagihan)}</p>
                                                </div>
                                                <button onClick={() => setUpdateModal({ isOpen: true, pkg: pkg, status: 'SUKSES', keterangan: '', fotoBukti: null })} className="bg-blue-600 text-white font-bold text-xs px-4 py-2.5 rounded-lg shadow-lg shadow-blue-900/50 hover:bg-blue-500 transition-colors">
                                                    Update Status
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* TAB 2: INPUT PAKET BARU */}
                        {activeTab === 'input' && (
                            <div className="animate-fade-in-down bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-lg">
                                <h2 className="font-black text-white mb-5 text-lg border-b border-slate-700 pb-3"><i className="fas fa-plus-circle mr-2 text-emerald-400"></i>Input Paket Baru</h2>
                                
                                <form onSubmit={submitNewPackage} className="space-y-4">
                                    {/* Resi Auto Generated (Terkunci) */}
                                    <div>
                                        <label className="flex items-center gap-1.5 text-blue-400"><i className="fas fa-barcode"></i> Resi / ID Paket (Otomatis)</label>
                                        <input type="text" readOnly value={form.idPaket} className="font-mono text-center text-lg font-black tracking-widest text-blue-300 bg-slate-900 border-slate-600 shadow-inner" />
                                    </div>
                                    
                                    {/* Pilihan Olshop Dinamis */}
                                    <div>
                                        <label><i className="fas fa-store mr-1 text-orange-400"></i> Pilih Olshop</label>
                                        <select 
                                            required 
                                            value={form.olshopName} 
                                            onChange={e => setForm({...form, olshopName: e.target.value})}
                                            className="font-bold text-sm"
                                        >
                                            <option value="">-- Pilih Olshop Pengirim --</option>
                                            {olshops.map((o, i) => <option key={i} value={o.nama}>{o.id} - {o.nama}</option>)}
                                        </select>
                                    </div>
                                    
                                    <div className="border-t border-slate-700 pt-4 mt-2">
                                        <label><i className="fas fa-user mr-1 text-slate-400"></i> Nama Penerima</label>
                                        <input type="text" required value={form.customerName} onChange={e=>setForm({...form, customerName: e.target.value})} placeholder="Ketik nama lengkap..." />
                                    </div>
                                    
                                    <div>
                                        <label><i className="fas fa-phone mr-1 text-slate-400"></i> No HP Penerima</label>
                                        <input type="tel" value={form.customerPhone} onChange={e=>setForm({...form, customerPhone: e.target.value})} placeholder="08..." />
                                    </div>
                                    
                                    <div>
                                        <label><i className="fas fa-map-marker-alt mr-1 text-slate-400"></i> Alamat Lengkap</label>
                                        <textarea required rows="2" value={form.address} onChange={e=>setForm({...form, address: e.target.value})} placeholder="Patokan detail rumah..."></textarea>
                                    </div>
                                    
                                    <div className="border-t border-slate-700 pt-4 mt-2">
                                        <label><i className="fas fa-tags mr-1 text-emerald-400"></i> Harga Barang</label>
                                        <div className="relative">
                                            <span className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 font-bold">Rp</span>
                                            <input type="number" required value={form.hargaPaket} onChange={e=>setForm({...form, hargaPaket: e.target.value})} className="pl-9 font-bold text-emerald-400" placeholder="0" />
                                        </div>
                                    </div>

                                    {/* Pilihan Zona Ongkir Terintegrasi */}
                                    <div className="bg-slate-900/50 p-3 rounded-xl border border-slate-700">
                                        <div>
                                            <label className="text-blue-400"><i className="fas fa-map mr-1"></i> Pilih Zona Pengiriman</label>
                                            <select 
                                                required 
                                                value={form.zonaSelected} 
                                                onChange={e => {
                                                    const selZ = zonas.find(z => z.nama === e.target.value);
                                                    setForm({...form, zonaSelected: e.target.value, ongkirDasar: selZ ? selZ.harga : ''});
                                                }}
                                                className="text-sm font-bold border-blue-900/50 focus:border-blue-500 bg-slate-800"
                                            >
                                                <option value="">-- Tentukan Zona --</option>
                                                {zonas.map((z, i) => <option key={i} value={z.nama}>{z.nama} (Rp {formatCurr(z.harga)})</option>)}
                                            </select>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-3 mt-3">
                                            <div>
                                                <label className="text-[10px] text-blue-400/80">Ongkir Dasar</label>
                                                <input type="number" required value={form.ongkirDasar} onChange={e=>setForm({...form, ongkirDasar: e.target.value})} className="text-sm font-bold bg-slate-800" placeholder="Rp 0" />
                                            </div>
                                            <div>
                                                <label className="text-[10px] text-orange-400/80">Tambahan (Vol)</label>
                                                <input type="number" value={form.tambahanOngkir} onChange={e=>setForm({...form, tambahanOngkir: e.target.value})} className="text-sm font-bold bg-slate-800" placeholder="Rp 0" />
                                            </div>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-center text-slate-400 mt-2">Total Tagihan Final</label>
                                        <div className="bg-black/40 border border-slate-700 text-white p-3.5 rounded-xl text-center font-black text-2xl tracking-wider shadow-inner">
                                            {formatCurr((Number(form.hargaPaket)||0) + (Number(form.ongkirDasar)||0) + (Number(form.tambahanOngkir)||0))}
                                        </div>
                                    </div>

                                    <div className="border-t border-slate-700 pt-4 mt-2">
                                        <label><i className="fas fa-money-bill-wave mr-1 text-yellow-400"></i> Metode Pembayaran</label>
                                        <select value={form.metodeBayar} onChange={e=>setForm({...form, metodeBayar: e.target.value})} className="font-bold text-sm bg-slate-800">
                                            <option value="CASH">CASH / TUNAI</option>
                                            <option value="TF OLSHOP">TRANSFER KE OLSHOP</option>
                                            <option value="TF KANTOR">TRANSFER KE KANTOR</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label><i className="fas fa-camera mr-1 text-slate-400"></i> Foto Bukti Paket (Opsional)</label>
                                        <div className="relative border-2 border-dashed border-slate-600 rounded-xl p-3 text-center hover:bg-slate-700 transition">
                                            <input type="file" accept="image/*" capture="environment" onChange={e=>setForm({...form, fotoBukti: e.target.files[0]})} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            {form.fotoBukti ? (
                                                <p className="text-emerald-400 font-bold text-xs"><i className="fas fa-check-circle mr-1.5"></i>1 Foto Terlampir</p>
                                            ) : (
                                                <div><i className="fas fa-upload text-xl text-slate-500 mb-1"></i><p className="text-[10px] text-slate-400 font-bold">Ketuk untuk buka kamera / galeri</p></div>
                                            )}
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-emerald-600 text-white font-black text-lg py-4 rounded-xl shadow-lg shadow-emerald-900/50 hover:bg-emerald-500 transition-transform active:scale-95 mt-6 border border-emerald-500/50">
                                        <i className="fas fa-paper-plane mr-2"></i> SIMPAN PAKET
                                    </button>
                                </form>
                            </div>
                        )}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 w-full max-w-lg bg-slate-900 border-t border-slate-800 flex justify-around pb-safe pt-2 pb-2 z-40 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.3)]">
                        <button onClick={() => {setActiveTab('list'); loadData();}} className={`flex-1 py-2 flex flex-col items-center transition-colors ${activeTab === 'list' ? 'text-blue-500' : 'text-slate-500 hover:text-slate-400'}`}>
                            <i className="fas fa-list text-xl mb-1.5"></i><span className="text-[10px] font-bold tracking-wide">TUGAS SAYA</span>
                        </button>
                        <button onClick={() => setActiveTab('input')} className={`flex-1 py-2 flex flex-col items-center transition-colors ${activeTab === 'input' ? 'text-emerald-500' : 'text-slate-500 hover:text-slate-400'}`}>
                            <i className="fas fa-plus-circle text-xl mb-1.5"></i><span className="text-[10px] font-bold tracking-wide">INPUT PAKET</span>
                        </button>
                    </nav>

                    {/* MODAL UPDATE STATUS */}
                    {updateModal.isOpen && (
                        <div className="fixed inset-0 z-50 bg-black/80 flex flex-col justify-end backdrop-blur-sm">
                            <div className="bg-slate-800 rounded-t-3xl p-6 border-t border-slate-700 animate-fade-in-down shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.5)]">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-white text-xl">Resi: <span className="text-blue-400">{updateModal.pkg.packageId}</span></h3>
                                    <button onClick={() => setUpdateModal({...updateModal, isOpen: false})} className="text-slate-400 bg-slate-700 w-8 h-8 rounded-full flex items-center justify-center hover:bg-slate-600 transition-colors"><i className="fas fa-times"></i></button>
                                </div>

                                <div className="space-y-5">
                                    <div>
                                        <label className="text-slate-300">Pilih Status Final</label>
                                        <select value={updateModal.status} onChange={e=>setUpdateModal({...updateModal, status: e.target.value})} className="bg-slate-900 border-slate-600 py-3.5 font-black text-lg focus:border-blue-500">
                                            <option value="SUKSES">✅ SUKSES DIKIRIM</option>
                                            <option value="PENDING">⏱️ PENDING (DITUNDA)</option>
                                            <option value="CANCEL">❌ CANCEL (BATAL)</option>
                                        </select>
                                    </div>
                                    
                                    {(updateModal.status === 'PENDING' || updateModal.status === 'CANCEL') && (
                                        <div className="animate-fade-in-down">
                                            <label className="text-red-400 font-bold">Wajib Isi Alasan / Keterangan</label>
                                            <textarea required rows="2" value={updateModal.keterangan} onChange={e=>setUpdateModal({...updateModal, keterangan: e.target.value})} placeholder="Tulis alasan detail kenapa pending/batal..." className="border-red-900/50 focus:border-red-500"></textarea>
                                        </div>
                                    )}

                                    <div>
                                        <label className="text-slate-300">Upload Foto Bukti (Dari Kamera)</label>
                                        <div className={`relative border-2 border-dashed rounded-xl p-6 text-center transition-colors ${updateModal.fotoBukti ? 'border-emerald-500 bg-emerald-900/20' : 'border-slate-600 hover:bg-slate-700'}`}>
                                            <input type="file" accept="image/*" capture="environment" onChange={e=>setUpdateModal({...updateModal, fotoBukti: e.target.files[0]})} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            {updateModal.fotoBukti ? (
                                                <div className="flex flex-col items-center">
                                                    <i className="fas fa-check-circle text-4xl text-emerald-500 mb-2"></i>
                                                    <p className="text-emerald-400 font-bold">Foto Bukti Siap Dikirim</p>
                                                    <p className="text-[10px] text-slate-400 mt-1">Ketuk lagi jika ingin mengganti foto</p>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col items-center">
                                                    <i className="fas fa-camera text-4xl text-slate-500 mb-3"></i>
                                                    <p className="text-sm text-slate-300 font-bold">Ketuk untuk Buka Kamera</p>
                                                    <p className="text-[10px] text-slate-500 mt-1">Wajib jika paket sukses</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <button onClick={submitUpdateStatus} className="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-900/50 hover:bg-blue-500 transition-transform active:scale-95 text-lg border border-blue-500/50 mt-4">
                                        <i className="fas fa-cloud-upload-alt mr-2"></i> SIMPAN STATUS
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
